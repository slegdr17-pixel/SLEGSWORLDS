<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLEGSWORLDS - Cinematic V</title>
    <style>
        /* High-End Dark Fantasy Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #050505; font-family: 'Georgia', serif; color: #f3e5ab; }
        
        /* Intro Fog Screen */
        #intro-screen {
            position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, #151515 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10;
            transition: opacity 2s ease;
        }
        #intro-title { font-size: 2.2rem; letter-spacing: 0.6rem; text-transform: uppercase; margin-bottom: 2rem; text-shadow: 0 0 15px rgba(243,229,171,0.4); }
        .enter-btn { padding: 15px 40px; background: transparent; border: 1px solid #f3e5ab; color: #f3e5ab; font-size: 1rem; letter-spacing: 0.3rem; cursor: pointer; transition: all 0.5s; }
        .enter-btn:hover { background: #f3e5ab; color: #000; box-shadow: 0 0 20px #f3e5ab; }

        /* Cinematic Background Video Layer */
        #video-container { position: absolute; width: 100%; height: 100%; z-index: 1; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4) contrast(1.1); }

        /* Luxury Gothic Envelope Layer */
        #interactive-area { position: absolute; width: 100%; height: 100%; z-index: 2; display: flex; justify-content: center; align-items: center; pointer-events: none; }
        .envelope { width: 280px; height: 180px; background: #3a0808; border: 2px solid #5a1818; box-shadow: 0 20px 50px rgba(0,0,0,0.9); position: relative; opacity: 0; transform: translateY(50px); transition: all 2.5s cubic-bezier(0.25, 1, 0.5, 1); pointer-events: auto; cursor: pointer; }
        .envelope.show { opacity: 1; transform: translateY(0); }
        .wax-seal { width: 55px; height: 55px; background: #800020; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; font-size: 1.1rem; border: 2px dashed #f3e5ab; color: #f3e5ab; }

        /* Elegant Letter Overlay */
        .letter-content { display: none; position: fixed; top: 12%; left: 6%; width: 88%; height: 76%; background: #121212; border: 1px solid #333; box-shadow: 0 0 50px #000; padding: 35px; z-index: 5; overflow-y: auto; text-align: center; border-radius: 4px; transition: all 0.5s; }
        .letter-text { font-size: 1.1rem; line-height: 2.4rem; font-style: italic; white-space: pre-line; letter-spacing: 0.05rem; color: #e5d493; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div id="intro-title">V Years</div>
        <button class="enter-btn" onclick="startCinematic()">ENTER SANCTUARY</button>
    </div>

    <div id="video-container">
        <video id="bg-video" loop muted playsinline>
            <source src="church.mp4" type="video/mp4">
        </video>
    </div>

    <div id="interactive-area">
        <div id="envelope" class="envelope" onclick="openLetter()">
            <div class="wax-seal">V</div>
        </div>
    </div>

    <div id="letter-window" class="letter-content" onclick="closeLetter()">
        <div class="letter-text">
            To my sanctuary,

            [Your beautiful anniversary text or poem will go right here]

            Happy V Years.
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="golden-brown.mp3" type="audio/mpeg">
    </audio>

    <script>
        const video = document.getElementById('bg-video');
        const music = document.getElementById('bg-music');

        function startCinematic() {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('intro-screen').style.display = 'none'; }, 2000);
            
            // Activate High-End Atmospheric Playback
            video.play();
            music.play();
            music.playbackRate = 0.75; // Perfectly slows down your track for that dark echo vibe

            // The luxury envelope rises out of the cathedral mist after 5 seconds of the camera walking
            setTimeout(() => {
                document.getElementById('envelope').classList.add('show');
            }, 5000);
        }

        function openLetter() { document.getElementById('letter-window').style.display = 'block'; }
        function closeLetter() { document.getElementById('letter-window').style.display = 'none'; }
    </script>
</body>
</html>
