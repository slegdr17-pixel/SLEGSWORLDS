<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; overflow: hidden; background: #020202; color: #d4c4a8; font-family: 'Georgia', serif; }
        #video-bg { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.4); }
        .btn { padding: 20px 50px; background: rgba(0,0,0,0.6); border: 2px solid #5a1818; color: #e5d493; cursor: pointer; letter-spacing: 5px; font-size: 1.5rem; text-transform: uppercase; }
        #poem-box { display: none; position: absolute; top: 15%; left: 20%; width: 60%; height: 70%; background: rgba(10, 10, 10, 0.85); border: 1px solid #4a1010; padding: 50px; overflow-y: auto; text-align: center; box-shadow: 0 0 20px #000; }
    </style>
</head>
<body>

    <video autoplay muted loop id="video-bg">
        <source src="intro.mp4" type="video/mp4">
    </video>

    <div id="overlay">
        <button class="btn" onclick="revealPoem()">ENTER THE SANCTUARY</button>
    </div>

    <div id="poem-box">
        <p style="white-space:pre-line; font-style:italic; line-height:2.2; font-size: 1.3rem;">
            [Insert your beautiful poem here]
        </p>
    </div>

    <script>
        function revealPoem() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('poem-box').style.display = 'block';
            // Trigger audio if you have an audio file here
        }
    </script>
</body>
</html>
