<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; overflow: hidden; background: url('https://i.pinimg.com/736x/95/05/f4/9505f42db6c255efe9596de522844f67.jpg') no-repeat center center fixed; background-size: cover; color: #d4c4a8; font-family: 'Georgia', serif; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.6); }
        .btn { padding: 20px 50px; background: transparent; border: 1px solid #e5d493; color: #e5d493; cursor: pointer; letter-spacing: 5px; font-size: 1.2rem; transition: 0.3s; }
        .btn:hover { background: #e5d493; color: #000; }
        #main-content { display: none; text-align: center; margin-top: 10%; }
        #poem-box { width: 60%; margin: 0 auto; background: rgba(0,0,0,0.7); padding: 40px; border: 1px solid #5a1818; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 10px; text-transform: uppercase;">Welcome, Luka</h1>
        <button class="btn" onclick="startExperience()">ENTER</button>
    </div>

    <div id="main-content">
        <div id="poem-box" onclick="this.style.display='none'">
            <p style="white-space:pre-line; font-style:italic; line-height:2.0; font-size: 1.3rem;">
                [Insert your poem here]
            </p>
        </div>
    </div>

    <script>
        function startExperience() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }
    </script>
</body>
</html>
