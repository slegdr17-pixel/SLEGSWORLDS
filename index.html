<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #d4c4a8; font-family: 'Georgia', serif; }
        .bg-vid { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.4); }
        .btn { padding: 20px 50px; background: rgba(0,0,0,0.6); border: 1px solid #e5d493; color: #e5d493; cursor: pointer; letter-spacing: 5px; font-size: 1.2rem; transition: 0.3s; }
        .btn:hover { background: #e5d493; color: #000; }
        #main-content { display: none; opacity: 0; transition: opacity 2s ease-in; text-align: center; margin-top: 10%; }
        #poem-box { width: 60%; margin: 0 auto; background: rgba(0,0,0,0.8); padding: 40px; border: 1px solid #5a1818; box-shadow: 0 0 30px #000; }
    </style>
</head>
<body>

    <video id="bg-video" class="bg-vid" autoplay muted loop>
        <source id="vid-source" src="YOUR_INTRO_FILE_NAME.mp4" type="video/mp4">
    </video>

    <div id="overlay">
        <h1 id="msg" style="letter-spacing: 10px; text-transform: uppercase;">Welcome, Luka</h1>
        <button id="game-btn" class="btn" onclick="playGame()">ENTER</button>
    </div>

    <div id="main-content">
        <div id="poem-box">
            <p style="white-space:pre-line; font-style:italic; line-height:2.0; font-size: 1.3rem;">
                [Insert your poem here]
            </p>
        </div>
    </div>

    <script>
        let clicks = 0;
        function playGame() {
            clicks++;
            const msg = document.getElementById('msg');
            const video = document.getElementById('bg-video');
            const source = document.getElementById('vid-source');

            if (clicks < 3) {
                msg.innerText = "Break the seal (" + (3 - clicks) + ")";
            } else {
                // Switch to the cinematic walk video
                source.src = "WhatsApp%20Video%202026-06-10%20at%202.57.17%20PM.mp4";
                video.load();
                document.getElementById('overlay').style.display = 'none';
                const main = document.getElementById('main-content');
                main.style.display = 'block';
                setTimeout(() => { main.style.opacity = '1'; }, 50);
            }
        }
    </script>
</body>
</html>
